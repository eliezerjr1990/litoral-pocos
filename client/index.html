<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Litoral Poços - Modernizado</title>
    <script>
      // Remover elemento flutuante de contador assim que a página carregar
      function removeFloatingCounter() {
        const allElements = document.querySelectorAll('*');
        for (let el of allElements) {
          // Procurar por elemento com "Visitas" que não está no footer
          if (el.textContent && el.textContent.includes('Visitas:') && el.closest('footer') === null) {
            // Verificar se tem posição fixed
            const style = window.getComputedStyle(el);
            if (style.position === 'fixed') {
              el.remove();
            }
          }
        }
      }
      // Executar quando o DOM estiver pronto
      document.addEventListener('DOMContentLoaded', removeFloatingCounter);
      // Executar também após um pequeno delay para pegar elementos injetados depois
      setTimeout(removeFloatingCounter, 500);
      setTimeout(removeFloatingCounter, 1000);
    </script>
